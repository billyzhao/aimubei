# ====================================
# 永念 EverMind - 生产部署 Docker Compose
# 轻量化方案：SQLite + Next.js（适合 2C/2G+ 服务器）
# ====================================
version: "3.8"

services:
  evermind:
    build: .
    container_name: evermind
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/evermind.db
      - NEXTAUTH_URL=http://39.108.128.34
      - NEXTAUTH_SECRET=evermind-prod-secret-2024-evermind-evermind
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - evermind-db:/app/data
      - evermind-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/memorials"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  evermind-db:
    driver: local
  evermind-uploads:
    driver: local
