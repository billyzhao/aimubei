# 永念 EverMind - Docker Compose
# 使用方式：docker-compose up -d
# 需要安装 Docker Desktop

version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: evermind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: evermind
      POSTGRES_USER: evermind
      POSTGRES_PASSWORD: evermind123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evermind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: evermind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO 对象存储 (照片/语音文件)
  minio:
    image: minio/minio:latest
    container_name: evermind-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: evermind
      MINIO_ROOT_PASSWORD: evermind123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
